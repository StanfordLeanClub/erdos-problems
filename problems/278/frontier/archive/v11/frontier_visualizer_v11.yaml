frontier_version: v10_corrected
date: 2026-04-25

ultimate_problem:
  name: "Erdős #278"
  goal: "maximum density of congruence covers"
  public_status: "open"

status_summary: >
  Project remains paper-worthy, but v9 overclaimed the weighted material.
  Stable core is squarefree congruence packing via common-core graph links.
  Weighted graph-link results should be treated as packable-subgraph optimization
  or lower-bound machinery unless a layer-union upper bound is proved.

major_corrections:
  - name: "Packable-subgraph vs full #278 maximum"
    old_claim: "Weighted graph-link optima give exact #278 maxima in broad non-perfect regimes."
    corrected_status: "They optimize packable subgraphs / disjoint constructions; full union can be larger."
    witness: "One-layer K4 has packable value 3 p^-2 but proper-label union value 6 p^-2 - 3 p^-4."
  - name: "Nonuniform clique-link n-2 criterion"
    old_claim: "Delete two vertices; use c_i - 2 prefix inequalities."
    corrected_status: "Use one triangle plus n-3 stars; delete three triangle vertices; use b_i - 3 prefix inequalities."
  - name: "Arbitrary-weight clique threshold theorem"
    old_claim: "Threshold graph on heaviest vertices is always weighted-optimal."
    corrected_status: "False for arbitrary weights; demote/delete unless special hypotheses are proved."

stable_abstractions:
  - squarefree product-space cylinder model
  - singleton residual-box reduction
  - perfect packing
  - intersection-separating coloring
  - common-core theorem
  - graph-link invariant chi_d(G)
  - star-triangle normal form for chi_d(F)

stable_packability_results:
  - pair-support theorem
  - star formula chi_d(K_1,r)=ceil(r/d)
  - complete bipartite packability formula, Lean currently small-side only
  - uniform clique-link theorem as project-level result, not yet Lean-formalized
  - corrected arithmetic clique-link threshold, pending corrected proof writeup

packable_subgraph_algorithms:
  - fixed-budget XP algorithm for P_t(G) by triangle enumeration + max-flow
  - fixed-treewidth DP schema for P_t(G)
  - tree / triangle-free orientation-cost special cases

true_maximum_frontier:
  object: "U_d(H), the one-layer graph-link union optimum"
  description: >
    Choose one pair-cylinder for every edge of H and maximize actual union measure.
    Intersections are governed by local consistency of endpoint labels.
  first_target: >
    Prove/refute that full-capacity proper local labeling is optimal, yielding the matching-polynomial expression.

lean_status:
  stable_formalized:
    - product-space cylinder model
    - perfect packing / intersection separation
    - pair-support theorem
    - common-core theorem with disjoint-petal hypothesis
    - graph-link definitions and chi predicates
    - stars and complete bipartite small-side theorem
  avoid_formalizing_as_stated:
    - old nonuniform clique criterion with c_i - 2
    - arbitrary-weight clique threshold theorem as #278 maximum
    - weighted graph-link results as exact full #278 maximum theorems

